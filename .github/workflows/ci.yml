name: Enterprise App CI

on:
  push:
    branches:
      - main
      - feature/*

  pull_request:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Dependencies
        run: go mod download

      - name: Build Application
        run: go build ./...

      - name: Run Tests
        run: go test ./...

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ghcr.io/sp3640/enterprise-api:latest \
          .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/sp3640/enterprise-api:latest